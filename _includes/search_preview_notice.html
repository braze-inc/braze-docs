<div id="search-preview-notice" class="alert alert-warning search-preview-notice" role="alert" style="display: none;">
  <div class="alert-msg">
    <strong>On this preview deployment, search results open on the live documentation site.</strong> To stay on this preview when searching, copy the link from the search result, paste it into the URL bar, and remove the leading <code>https://braze.com/</code> or <code>https://braze.com/docs/</code>. Or use the top nav or left nav.
  </div>
</div>
<script>
(function() {
  var hostname = window.location.hostname;
  if (hostname === 'vercel.app' || hostname.endsWith('.vercel.app')) {
    var el = document.getElementById('search-preview-notice');
    if (el) el.style.display = '';
  }
})();
</script>
