# Automatically translates changed English docs into all supported languages
# when changes land on main (typically via the nightly develop → main deploy).
#
# Flow:
#   1. Identify _docs/ markdown files changed in the push
#   2. Translate each file into 6 languages via Claude API
#   3. Build each language with Jekyll to verify translations
#   4. If a build fails, send errors back to Claude for auto-fix (up to 3 attempts)
#   5. Clean up orphaned translation files (translations with no English source)
#   6. Open a PR targeting develop with the translations
name: Auto-translate

on:
  push:
    branches: [main]
    paths: ['_docs/**']
  workflow_dispatch:
    inputs:
      files:
        description: >
          Space-separated _docs/ paths to translate
          (leave empty to detect from the last push)
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-translate:
    runs-on: ubuntu-latest
    timeout-minutes: 720
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      # ------------------------------------------------------------------
      # Checkout
      # ------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ------------------------------------------------------------------
      # Detect which English docs changed
      # ------------------------------------------------------------------
      - name: Identify changed English files
        id: changes
        run: |
          if [ -n "${{ inputs.files }}" ]; then
            echo "${{ inputs.files }}" | tr ' ' '\n' > changed_files.txt
          elif [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            git diff --name-only --diff-filter=ACMR \
              ${{ github.event.before }} ${{ github.sha }} \
              -- '_docs/' > changed_files.txt
          else
            git diff --name-only --diff-filter=ACMR \
              HEAD~1 HEAD \
              -- '_docs/' > changed_files.txt
          fi

          # Keep only markdown files
          grep '\.md$' changed_files.txt > filtered.txt 2>/dev/null || true
          mv filtered.txt changed_files.txt

          echo "Changed files:"
          cat changed_files.txt

          count=$(wc -l < changed_files.txt | tr -d ' ')
          echo "count=${count}" >> "$GITHUB_OUTPUT"

      - name: Skip if no changes
        if: steps.changes.outputs.count == '0'
        run: |
          echo "No English markdown changes detected — nothing to translate."
          exit 0

      # ------------------------------------------------------------------
      # Translate
      # ------------------------------------------------------------------
      - name: Set up Python
        if: steps.changes.outputs.count != '0'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        if: steps.changes.outputs.count != '0'
        run: pip install anthropic

      - name: Translate changed files
        if: steps.changes.outputs.count != '0'
        run: python scripts/auto_translate.py translate --changed-files changed_files.txt

      # ------------------------------------------------------------------
      # Build verification + auto-fix loop
      # ------------------------------------------------------------------
      - name: Set up Ruby
        if: steps.changes.outputs.count != '0'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Clean up orphaned translations
        if: steps.changes.outputs.count != '0'
        run: python scripts/clean_orphaned_translations.py

      - name: Verify builds and fix errors
        if: steps.changes.outputs.count != '0'
        run: python scripts/auto_translate.py verify --max-attempts 3

      # ------------------------------------------------------------------
      # Open PR targeting develop
      # ------------------------------------------------------------------
      - name: Generate PR summary
        if: steps.changes.outputs.count != '0'
        run: python scripts/auto_translate.py summary

      - name: Create pull request
        if: steps.changes.outputs.count != '0'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto-translate/${{ github.run_id }}
          base: develop
          title: "Auto-translations — ${{ github.event.head_commit.message || 'manual run' }}"
          body-path: translation_pr_body.md
          labels: auto-translation
          commit-message: "chore: auto-translate changed English docs"
          delete-branch: true
          add-paths: |
            _lang/
