# Optimizes only the images that are added or modified in a pull request.
name: "Optimize Images"

on:
  pull_request:
    # Run this workflow only if image files under assets/img/ are changed.
    paths:
      - 'assets/img/**/*.png'
      - 'assets/img/**/*.jpg'
      - 'assets/img/**/*.jpeg'

jobs:
  optimize:
    runs-on: ubuntu-latest

    steps:
      # Checks out the PR branch with history so diffs can be detected.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Installs CLI tools for image optimization.
      - run: sudo apt-get update && sudo apt-get install -y pngquant jpegoptim

      # Ensures the base branch ref is available for the diff.
      - run: git fetch origin ${{ github.base_ref }} --no-tags

      # Finds only added/modified PNG or JPG files in the PR and optimizes them in place.
      - run: |
          files=$(git diff --name-only --diff-filter=AM origin/${{ github.base_ref }}...HEAD | grep -E '^assets/img/.*\.(png|jpg|jpeg)$' || true)
          if [[ -n "$files" ]]; then
            echo "$files" | while IFS= read -r f; do
              case "$f" in
                *.png)  pngquant --skip-if-larger --ext .png --force 80 "$f" || true ;;
                *.jpg|*.jpeg) jpegoptim --strip-all --max=80 "$f" || true ;;
              esac
            done
          else
            echo "No image files to optimize."
          fi
          exit 0

      # Commit and push optimized images. We do this with explicit git commands
      # instead of git-auto-commit-action to avoid the action's internal
      # fetch/checkout overwriting our modified image files (which causes
      # "Your local changes would be overwritten by checkout" on force-pushed branches).
      - name: Commit and push optimized images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/img/
          if git diff --staged --quiet; then
            echo "No image changes to commit."
          else
            git commit -m "optimize png, jpg, and jpeg files"
            git push
          fi
