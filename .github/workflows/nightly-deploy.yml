# Nightly Release Deploy
#
# Required secret: DEPLOY_MERGE_TOKEN
#   A Personal Access Token (classic or fine-grained) from a user with write access
#   who can bypass branch protection on main. Create at:
#   https://github.com/settings/tokens (classic) or
#   https://github.com/settings/tokens?type=beta (fine-grained)
#   Add as repo secret: Settings → Secrets and variables → Actions → New repository secret
#
name: Nightly Release Deploy

on:
  schedule:
    - cron: '0 8 * * 1-5' # 12am PT / 3am ET, Sun-Thu nights (Mon-Fri UTC)
  workflow_dispatch:

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      pr_number: ${{ steps.cpr.outputs.pr_number }}
      skipped: ${{ steps.diff.outputs.skipped }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for diff between develop and main
        id: diff
        run: |
          git fetch origin main develop
          if git diff --quiet origin/main..origin/develop; then
            echo "No changes between develop and main. Skipping."
            echo "skipped=true" >> "$GITHUB_OUTPUT"
          else
            echo "skipped=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate deploy body text
        if: steps.diff.outputs.skipped == 'false'
        id: body
        run: |
          export PROJECT_ROOT="$GITHUB_WORKSPACE"
          export PRIMARY_BRANCH="main"
          mkdir -p "$PROJECT_ROOT/scripts/temp"
          chmod +x "$PROJECT_ROOT/scripts/create_deploy_text.sh"
          DEPLOY_TEXT=$("$PROJECT_ROOT/scripts/create_deploy_text.sh" || true)

          if [ -z "$DEPLOY_TEXT" ]; then
            DEPLOY_TEXT="No PR details available."
          fi

          # Write to a file so we can pass multiline text cleanly
          echo "$DEPLOY_TEXT" > "$RUNNER_TEMP/deploy_body.txt"

      - name: Create or find Pull Request
        if: steps.diff.outputs.skipped == 'false'
        id: cpr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="Nightly Deploy — $(date -u +'%B %d, %Y')"
          BODY=$(cat "$RUNNER_TEMP/deploy_body.txt")
          EXISTING=$(gh pr list --base main --head develop --state open --json number --jq '.[0].number')

          if [ -n "$EXISTING" ]; then
            echo "Reusing existing PR #$EXISTING — updating title, body, and label."
            gh pr edit "$EXISTING" --title "$TITLE" --body "$BODY" --add-label "Deploy"

            # Add reviewer only if not already requested (idempotent for nightly re-runs)
            REQUESTED=$(gh api repos/${{ github.repository }}/pulls/$EXISTING -q '.requested_teams[].slug' 2>/dev/null || true)
            if [[ "$REQUESTED" != *"braze-docs"* ]]; then
              gh pr edit "$EXISTING" --add-reviewer braze-inc/braze-docs
            fi

            echo "pr_number=$EXISTING" >> "$GITHUB_OUTPUT"
          else
            gh pr create \
              --base main \
              --head develop \
              --title "$TITLE" \
              --body "$BODY" \
              --label "Deploy" \
              --reviewer braze-inc/braze-docs

            NEW=$(gh pr list --base main --head develop --state open --json number --jq '.[0].number')
            echo "Created PR #$NEW"
            echo "pr_number=$NEW" >> "$GITHUB_OUTPUT"
          fi

  approve-and-merge:
    needs: create-pr
    if: needs.create-pr.outputs.skipped != 'true'
    runs-on: ubuntu-latest
    environment: Production Automation
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check for merge token
        run: |
          if [ -z "${{ secrets.DEPLOY_MERGE_TOKEN }}" ]; then
            echo "::error::DEPLOY_MERGE_TOKEN secret is not set. Add a PAT at Settings → Secrets → Actions."
            exit 1
          fi
      - name: Merge PR
        # Uses DEPLOY_MERGE_TOKEN (PAT) because GITHUB_TOKEN cannot bypass branch
        # protection (required reviews, status checks). The PAT must be from a user
        # with write access who can bypass protection, or an org admin.
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_MERGE_TOKEN }}
          PR_NUMBER: ${{ needs.create-pr.outputs.pr_number }}
        run: gh pr merge "$PR_NUMBER" --repo ${{ github.repository }} --merge --admin
